name: skill-evals

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-evals:
    env:
      PYTHONUTF8: "1"

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python }}

      - name: Validate Python syntax
        run: >-
          python -c "from pathlib import Path;
          compile(Path('skills/production-delivery-orchestrator/scripts/install_skill.py').read_text(encoding='utf-8'),
          'install_skill.py', 'exec');
          compile(Path('skills/production-delivery-orchestrator/scripts/repository_inventory.py').read_text(encoding='utf-8'),
          'repository_inventory.py', 'exec');
          compile(Path('evals/production-delivery-orchestrator/run_evals.py').read_text(encoding='utf-8'),
          'run_evals.py', 'exec');
          compile(Path('evals/production-delivery-orchestrator/run_forward_tests.py').read_text(encoding='utf-8'),
          'run_forward_tests.py', 'exec');
          compile(Path('evals/production-delivery-orchestrator/run_client_matrix.py').read_text(encoding='utf-8'),
          'run_client_matrix.py', 'exec');
          compile(Path('release/build_release.py').read_text(encoding='utf-8'),
          'build_release.py', 'exec')"

      - name: Run workflow governance and credential checks
        run: >-
          python -m unittest discover
          -s .github/workflows/tests
          -p test_*.py
          -v

      - name: Verify generated registry and dependency inventory
        run: >-
          python tools/build_skill_registry.py --check &&
          python tools/generate_dependency_inventory.py --check

      - name: Run registry and tooling audit tests
        run: >-
          python -m unittest discover -s skills/tests -p test_*.py -v &&
          python -m unittest discover -s tools/tests -p test_*.py -v

      - name: Build and verify release artifacts from metadata
        run: >-
          python release/build_release.py --output-dir .release-artifacts &&
          python release/build_release.py --output-dir .release-artifacts --verify

      - name: Run release builder tests
        run: python -m unittest discover -s release/tests -p test_*.py -v

      - name: Run evaluation self-test
        run: python evals/production-delivery-orchestrator/run_evals.py --self-test

      - name: Compare published baseline with candidate
        run: >-
          python evals/production-delivery-orchestrator/run_evals.py
          --output-dir .eval-reports
          --report-prefix ci

      - name: Validate forward-test harness without spending provider quota
        run: python evals/production-delivery-orchestrator/run_forward_tests.py --self-test

      - name: Run forward-test security and evidence tests
        run: >-
          python -m unittest discover
          -s evals/production-delivery-orchestrator/tests
          -p test_*.py
          -v

      - name: Check stdlib trace line-coverage baseline
        if: runner.os == 'Linux'
        run: >-
          python -m trace --count --coverdir .trace-coverage --module unittest discover
          -s evals/production-delivery-orchestrator/tests -p test_*.py -q &&
          python tools/trace_coverage_baseline.py --trace-dir .trace-coverage
          --source evals/production-delivery-orchestrator/run_client_matrix.py
          --source evals/production-delivery-orchestrator/run_evals.py
          --source evals/production-delivery-orchestrator/run_forward_tests.py
          --output .trace-coverage/report.json --baseline docs/coverage-baseline.json --check

      - name: Confirm known-bad candidate is rejected
        run: >-
          python -c "import subprocess, sys;
          result = subprocess.run([sys.executable,
          'evals/production-delivery-orchestrator/run_evals.py',
          '--candidate',
          'evals/production-delivery-orchestrator/baselines/legacy-monolithic-proxy.md',
          '--output-dir', '.eval-reports', '--report-prefix', 'known-bad']);
          raise SystemExit(0 if result.returncode == 1 else 1)"

      - name: Run real installer integration tests
        run: >-
          python -m unittest discover
          -s skills/production-delivery-orchestrator/tests
          -p test_*.py
          -v

      - name: Check whitespace errors in changed event range
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          zero_sha="0000000000000000000000000000000000000000"
          head_sha="${HEAD_SHA:?missing GitHub head SHA}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            base_sha="${PR_BASE_SHA:?missing pull request base SHA}"
          elif [ "${EVENT_BEFORE:-}" != "$zero_sha" ] && [ -n "${EVENT_BEFORE:-}" ]; then
            base_sha="$EVENT_BEFORE"
          else
            head_sha="$(git rev-parse "${head_sha}^{}")"
            if [ "$REF_TYPE" = "tag" ] && base_sha="$(git rev-parse "${head_sha}^" 2>/dev/null)"; then
              :
            else
              base_sha="$(git hash-object -t tree /dev/null)"
            fi
          fi
          git diff --check "$base_sha" "$head_sha"
